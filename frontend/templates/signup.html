<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AI Nutrition Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
            <header style="text-align: center; margin-bottom: 2rem;">
                <h1>Sign Up</h1>
                <p class="subtitle">Create an account to start tracking your meals.</p>
            </header>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div
                style="background: rgba(239, 68, 68, 0.2); color: #fecaca; padding: 10px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; border: 1px solid rgba(239, 68, 68, 0.3);">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('signup') }}" method="POST"
                style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="email" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Email
                        ID</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com"
                        style="padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="password"
                        style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        style="padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
                </div>
                <button type="submit" style="margin-top: 1rem;">Sign Up</button>
            </form>

            <footer style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                <p style="color: var(--text-muted);">Already have an account? <a href="{{ url_for('login') }}"
                        style="color: var(--accent); text-decoration: none; font-weight: 600;">Login</a></p>
            </footer>
        </div>
    </div>
</body>

</html>
